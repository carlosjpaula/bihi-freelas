<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Entregador - Bihi Restaurante</title>
    <link rel="stylesheet" href="css/styles.css">
    
    <!-- PWA Icons for Mobile Homescreen -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="apple-icon.png">
    <meta name="theme-color" content="#f97316">
    <!-- Signature Pad -->
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.5/dist/signature_pad.umd.min.js"></script>
    <!-- HTML2PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1 id="page-title">Cadastro Entregador</h1>
            <p class="subtitle" id="page-subtitle">Preencha seus dados para continuar</p>
        </header>

        <main class="card" id="form-card">
            <form id="cadastro-form">
                
                <!-- Campo oculto auxiliar para garantir o tipo JS -->
                <select id="funcao" class="hidden"><option value="entregador" selected>Entregador</option></select>
                <div class="form-group">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" required placeholder="Digite seu nome">
                </div>

                <div class="form-group">
                    <label for="cpf">CPF</label>
                    <input type="text" id="cpf" required placeholder="000.000.000-00">
                </div>

                <div class="form-group">
                    <label for="pix">Chave PIX</label>
                    <input type="text" id="pix" required placeholder="Telefone, CPF ou E-mail">
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="pix-proprio" required>
                    <label for="pix-proprio">Confirmo que a chave PIX informada pertence a mim.</label>
                </div>

                <div class="form-group">
                    <label>Você possui MEI?</label>
                    <select id="tem-mei" required>
                        <option value="">Selecione...</option>
                        <option value="sim">Sim</option>
                        <option value="nao">Não</option>
                    </select>
                </div>

                <div class="form-group hidden" id="cnpj-group">
                    <label for="cnpj">CNPJ do MEI</label>
                    <input type="text" id="cnpj" placeholder="00.000.000/0000-00">
                </div>

                <hr style="border-color: rgba(255,255,255,0.1); margin: 2rem 0;">

                <div class="form-group">
                    <label>Foto de Identificação e Localização</label>
                    <p class="subtitle" style="font-size: 0.85rem; margin-bottom: 1rem;">
                        Precisamos de uma foto sua. Ao tirar a foto, também registraremos sua localização atual por segurança.
                    </p>
                    
                    <div class="camera-container">
                        <video id="camera-feed" autoplay playsinline muted></video>
                        <button type="button" id="btn-start-camera" class="btn btn-secondary">Abrir Câmera</button>
                        <button type="button" id="btn-take-photo" class="btn hidden">Tirar Foto e Pegar Localização</button>
                        <canvas id="photo-canvas" class="photo-canvas hidden"></canvas>
                        
                        <div id="location-data" class="hidden" style="color: #10b981; font-size: 0.9rem; margin-top: 0.5rem;">
                            📍 Localização obtida com sucesso.
                        </div>
                    </div>
                </div>

                <hr style="border-color: rgba(255,255,255,0.1); margin: 2rem 0;">

                <div class="form-group">
                    <div id="contract-text" class="hidden"></div>
                    
                    <div class="checkbox-group">
                        <input type="checkbox" id="aceita-termos" required>
                        <label for="aceita-termos" style="font-weight: normal; margin-bottom: 0;">Li e aceito os termos do contrato de prestação de serviços.</label>
                    </div>
                </div>

                <div class="form-group">
                    <label>Assinatura Digital</label>
                    <p class="subtitle" style="font-size: 0.85rem; margin-bottom: 0.5rem;">Assine no quadro abaixo:</p>
                    <div class="signature-container">
                        <canvas id="signature-pad" class="signature-pad"></canvas>
                        <button type="button" id="btn-clear-signature" class="btn btn-secondary" style="margin-top: 0.5rem; padding: 0.5rem 1rem;">Limpar Assinatura</button>
                    </div>
                </div>

                <button type="submit" class="btn btn-block" id="btn-submit">Finalizar Cadastro</button>
            </form>
        </main>

        <!-- Template Oculto para o PDF -->
        <div id="pdf-template" class="hidden">
            <div id="contract-preview">
                <!-- Conteúdo gerado via JS -->
            </div>
        </div>

    </div>

    <script src="js/contracts.js"></script>
    <script src="js/cadastro.js"></script>
</body>
</html>
